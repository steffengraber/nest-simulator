# Choose a build environment
dist: xenial

# Do not choose a language; we provide our own build tools.
language: generic

services:
  - docker

stages:
  - test

matrix:
  include:
    - name: "With MPI"
      env: xMPI=1
    - name: "Without MPI"
      env: xMPI=0
before_script: docker run -it --rm -d --user nest --name travis-test -v $(pwd):/home/nest/data steffengraber/travis-nest:latest
script:
  - docker images
  - echo $xMPI
  # - docker run -it --rm -d --user nest --name travis-test -v $(pwd):/home/nest/data steffengraber/travis-nest:latest
  - docker ps -a
  - docker exec -e xMPI=$xMPI --user nest travis-test bash /home/nest/data/extras/travis_tests.sh


