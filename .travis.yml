services:
  - docker

addons:
  apt:
    packages:
      - docker-ce

before_install:
- docker pull steffengraber/travis-nest:latest
- docker run -it --rm -d --user nest --name travis-test-nest -v $(pwd):/home/nest/data steffengraber/travis-nest:latest
- docker ps -a
- docker images


script:
  bash extras/docker_run.sh


